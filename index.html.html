<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Scroll Sim">
<title>Scroll Sim</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: black;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    touch-action: none;
  }
  #stage {
    position: relative;
    width: 100%; height: 100%;
  }
  .card {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    overflow: hidden;
  }
  .card canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
  }
  #counterWrap {
    position: absolute;
    top: 6%;
    width: 100%;
    text-align: center;
    z-index: 10;
    pointer-events: none;
  }
  #counterNum {
    font-size: 44px;
    font-weight: 800;
    color: white;
    text-shadow: 0 2px 10px rgba(0,0,0,0.35);
  }
  #counterLabel {
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.8);
    margin-top: 2px;
  }
  #hint {
    position: absolute;
    bottom: 8%;
    width: 100%;
    text-align: center;
    color: rgba(255,255,255,0.6);
    font-size: 13px;
    z-index: 10;
    pointer-events: none;
    transition: opacity 0.5s;
  }
</style>
</head>
<body>

<div id="stage">
  <div class="card" id="cardA"><canvas id="canvasA"></canvas></div>
  <div class="card" id="cardB"><canvas id="canvasB"></canvas></div>
  <div id="hint">swipe up ↑</div>
  <div id="counterWrap">
    <div id="counterNum">0</div>
    <div id="counterLabel">scrolls</div>
  </div>
</div>

<script>
const stage = document.getElementById('stage');
const counterNum = document.getElementById('counterNum');
const hint = document.getElementById('hint');

const canvasA = document.getElementById('canvasA');
const canvasB = document.getElementById('canvasB');
const cardA = document.getElementById('cardA');
const cardB = document.getElementById('cardB');

// layers[0]/[1] swap roles of "current"/"next" after each committed swipe,
// so whatever's visible while dragging is exactly what stays.
const layers = [
  { card: cardA, canvas: canvasA },
  { card: cardB, canvas: canvasB }
];
let curIdx = 0;
let nextIdx = 1;
function cur() { return layers[curIdx]; }
function nxt() { return layers[nextIdx]; }

let W, H;
function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  [canvasA, canvasB].forEach(c => {
    c.width = W * devicePixelRatio;
    c.height = H * devicePixelRatio;
  });
}
window.addEventListener('resize', resize);
resize();

// ---- color palette: bright + darker/moodier options for contrast variety ----
const PALETTE = [
  '#FF3B30','#FF9500','#FFCC00','#34C759','#00C7BE','#30B0C7','#32ADE6',
  '#007AFF','#5856D6','#AF52DE','#FF2D55','#A2845E',
  '#1C1C1E','#2C2C2E','#0A0A0A','#141414','#0B3D2E','#3D0B3D',
  '#0B1F3D','#3D2B0B','#4B0000','#00291C','#241033','#1A1A2E'
];

function randColor() {
  return PALETTE[Math.floor(Math.random() * PALETTE.length)];
}

function drawCard(canvas) {
  const ctx = canvas.getContext('2d');
  const dpr = devicePixelRatio;
  const w = canvas.width, h = canvas.height;
  const c1 = randColor();
  let c2 = randColor();
  while (c2 === c1) c2 = randColor();

  const angle = Math.random() * Math.PI * 2;
  const x1 = w/2 + Math.cos(angle) * w/2;
  const y1 = h/2 + Math.sin(angle) * h/2;
  const x2 = w/2 - Math.cos(angle) * w/2;
  const y2 = h/2 - Math.sin(angle) * h/2;

  const grad = ctx.createLinearGradient(x1, y1, x2, y2);
  grad.addColorStop(0, c1);
  grad.addColorStop(1, c2);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, h);

  const texture = Math.floor(Math.random() * 18);

  if (texture === 0) {
    // dot grid
    ctx.fillStyle = 'rgba(255,255,255,0.18)';
    const spacing = 60 * dpr;
    for (let x = spacing/2; x < w; x += spacing) {
      for (let y = spacing/2; y < h; y += spacing) {
        ctx.beginPath();
        ctx.arc(x, y, 5 * dpr, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  } else if (texture === 1) {
    // diagonal stripes
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 14 * dpr;
    for (let x = -h; x < w; x += 45 * dpr) {
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x + h, h);
      ctx.stroke();
    }
  } else if (texture === 2) {
    // radial glow
    const rg = ctx.createRadialGradient(w/2, h/2, 0, w/2, h/2, w * 0.6);
    rg.addColorStop(0, 'rgba(255,255,255,0.35)');
    rg.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = rg;
    ctx.fillRect(0, 0, w, h);
  } else if (texture === 3) {
    // horizontal bands
    ctx.fillStyle = 'rgba(0,0,0,0.12)';
    const bandH = 50 * dpr;
    for (let y = 0; y < h; y += bandH * 2) {
      ctx.fillRect(0, y, w, bandH);
    }
  } else if (texture === 4) {
    // scattered triangles
    ctx.fillStyle = 'rgba(255,255,255,0.10)';
    for (let i = 0; i < 14; i++) {
      const cx = Math.random() * w, cy = Math.random() * h;
      const s = (Math.random() * 60 + 30) * dpr;
      ctx.beginPath();
      ctx.moveTo(cx, cy - s/2);
      ctx.lineTo(cx - s/2, cy + s/2);
      ctx.lineTo(cx + s/2, cy + s/2);
      ctx.closePath();
      ctx.fill();
    }
  } else if (texture === 5) {
    // checkerboard
    const cell = 70 * dpr;
    ctx.fillStyle = 'rgba(0,0,0,0.14)';
    let row = 0;
    for (let y = 0; y < h; y += cell) {
      let col = row % 2;
      for (let x = -cell; x < w; x += cell) {
        if (col % 2 === 0) ctx.fillRect(x, y, cell, cell);
        col++;
      }
      row++;
    }
  } else if (texture === 6) {
    // crosshatch
    ctx.strokeStyle = 'rgba(255,255,255,0.12)';
    ctx.lineWidth = 6 * dpr;
    for (let x = -h; x < w; x += 50 * dpr) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x + h, h); ctx.stroke();
    }
    for (let x = 0; x < w + h; x += 50 * dpr) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x - h, h); ctx.stroke();
    }
  } else if (texture === 7) {
    // concentric rings
    ctx.strokeStyle = 'rgba(255,255,255,0.18)';
    ctx.lineWidth = 8 * dpr;
    const cx = w/2, cy = h/2;
    for (let r = 30 * dpr; r < w; r += 50 * dpr) {
      ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.stroke();
    }
  } else if (texture === 8) {
    // vertical stripes, varied widths
    let x = 0;
    let toggle = false;
    ctx.fillStyle = 'rgba(255,255,255,0.10)';
    while (x < w) {
      const sw = (Math.random() * 40 + 20) * dpr;
      if (toggle) ctx.fillRect(x, 0, sw, h);
      x += sw;
      toggle = !toggle;
    }
  } else if (texture === 9) {
    // scattered circles, varied size
    for (let i = 0; i < 20; i++) {
      const r = (Math.random() * 40 + 8) * dpr;
      ctx.fillStyle = `rgba(255,255,255,${(0.05 + Math.random() * 0.15).toFixed(2)})`;
      ctx.beginPath();
      ctx.arc(Math.random() * w, Math.random() * h, r, 0, Math.PI * 2);
      ctx.fill();
    }
  } else if (texture === 10) {
    // chevron / zigzag rows
    ctx.strokeStyle = 'rgba(255,255,255,0.16)';
    ctx.lineWidth = 8 * dpr;
    const zw = 60 * dpr, zh = 40 * dpr;
    for (let y = -zh; y < h + zh; y += zh) {
      ctx.beginPath();
      let x = 0, up = true;
      ctx.moveTo(x, y);
      while (x < w) {
        y += up ? -zh/2 : zh/2;
        x += zw/2;
        ctx.lineTo(x, y);
        up = !up;
      }
      ctx.stroke();
    }
  } else if (texture === 11) {
    // noise / grain speckle
    const dotCount = 900;
    for (let i = 0; i < dotCount; i++) {
      const shade = Math.random() < 0.5 ? 255 : 0;
      ctx.fillStyle = `rgba(${shade},${shade},${shade},${(Math.random() * 0.12).toFixed(2)})`;
      ctx.fillRect(Math.random() * w, Math.random() * h, 2 * dpr, 2 * dpr);
    }
  } else if (texture === 12) {
    // hexagon-ish grid (approximated with offset circles/hex paths)
    const size = 40 * dpr;
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 3 * dpr;
    for (let row = 0; row * size * 1.5 < h + size; row++) {
      for (let col = 0; col * size * Math.sqrt(3) < w + size; col++) {
        const cx = col * size * Math.sqrt(3) + (row % 2 ? size * Math.sqrt(3) / 2 : 0);
        const cy = row * size * 1.5;
        ctx.beginPath();
        for (let i = 0; i < 6; i++) {
          const a = Math.PI / 3 * i;
          const px = cx + size * 0.5 * Math.cos(a);
          const py = cy + size * 0.5 * Math.sin(a);
          if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
        }
        ctx.closePath();
        ctx.stroke();
      }
    }
  } else if (texture === 13) {
    // starburst rays from center
    const cx = w/2, cy = h/2;
    const rays = 16;
    for (let i = 0; i < rays; i++) {
      ctx.fillStyle = i % 2 === 0 ? 'rgba(255,255,255,0.10)' : 'rgba(0,0,0,0.06)';
      const a1 = (Math.PI * 2 / rays) * i;
      const a2 = a1 + (Math.PI * 2 / rays);
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(cx + Math.cos(a1) * w, cy + Math.sin(a1) * w);
      ctx.lineTo(cx + Math.cos(a2) * w, cy + Math.sin(a2) * w);
      ctx.closePath();
      ctx.fill();
    }
  } else if (texture === 14) {
    // soft blobs (plasma-ish)
    for (let i = 0; i < 5; i++) {
      const r = (Math.random() * 150 + 100) * dpr;
      const bg = ctx.createRadialGradient(
        Math.random() * w, Math.random() * h, 0,
        Math.random() * w, Math.random() * h, r
      );
      bg.addColorStop(0, `rgba(255,255,255,${(0.08 + Math.random() * 0.12).toFixed(2)})`);
      bg.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, w, h);
    }
  } else if (texture === 15) {
    // concentric squares
    ctx.strokeStyle = 'rgba(255,255,255,0.16)';
    ctx.lineWidth = 6 * dpr;
    const cx = w/2, cy = h/2;
    for (let s = 40 * dpr; s < w; s += 55 * dpr) {
      ctx.strokeRect(cx - s/2, cy - s/2, s, s);
    }
  } else if (texture === 16) {
    // spiral
    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
    ctx.lineWidth = 6 * dpr;
    const cx = w/2, cy = h/2;
    ctx.beginPath();
    for (let a = 0; a < Math.PI * 16; a += 0.1) {
      const r = a * 8 * dpr;
      const x = cx + Math.cos(a) * r;
      const y = cy + Math.sin(a) * r;
      if (a === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.stroke();
  } else if (texture === 17) {
    // confetti - small varied shapes scattered
    for (let i = 0; i < 30; i++) {
      const cx = Math.random() * w, cy = Math.random() * h;
      const s = (Math.random() * 16 + 6) * dpr;
      ctx.fillStyle = `rgba(255,255,255,${(0.08 + Math.random() * 0.18).toFixed(2)})`;
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(Math.random() * Math.PI * 2);
      ctx.fillRect(-s/2, -s/2, s, s * 0.4);
      ctx.restore();
    }
  }

  // Randomly darken or lighten the whole card for extra contrast variety
  const moodRoll = Math.random();
  if (moodRoll < 0.35) {
    ctx.fillStyle = `rgba(0,0,0,${(0.15 + Math.random() * 0.35).toFixed(2)})`;
    ctx.fillRect(0, 0, w, h);
  } else if (moodRoll > 0.85) {
    ctx.fillStyle = `rgba(255,255,255,${(0.08 + Math.random() * 0.15).toFixed(2)})`;
    ctx.fillRect(0, 0, w, h);
  }
}

drawCard(cur().canvas);
drawCard(nxt().canvas);
cur().card.style.transform = 'translateY(0px)';
nxt().card.style.transform = `translateY(${H}px)`;

// ---- pseudo-haptic "pop" sound (Safari blocks real vibration for web pages) ----
let audioCtx = null;
function tick() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const t = audioCtx.currentTime;

    // low thump body with a fast pitch drop, like something flat hitting a hollow pipe
    const osc = audioCtx.createOscillator();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(190, t);
    osc.frequency.exponentialRampToValueAtTime(55, t + 0.09);
    const oscGain = audioCtx.createGain();
    oscGain.gain.setValueAtTime(0.3, t);
    oscGain.gain.exponentialRampToValueAtTime(0.001, t + 0.11);
    osc.connect(oscGain).connect(audioCtx.destination);
    osc.start(t);
    osc.stop(t + 0.12);

    // short filtered noise burst for the "flat hit" click on top of the thump
    const bufferSize = Math.floor(audioCtx.sampleRate * 0.025);
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
      data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
    }
    const noise = audioCtx.createBufferSource();
    noise.buffer = buffer;
    const noiseFilter = audioCtx.createBiquadFilter();
    noiseFilter.type = 'lowpass';
    noiseFilter.frequency.value = 1100;
    const noiseGain = audioCtx.createGain();
    noiseGain.gain.setValueAtTime(0.18, t);
    noiseGain.gain.exponentialRampToValueAtTime(0.001, t + 0.03);
    noise.connect(noiseFilter).connect(noiseGain).connect(audioCtx.destination);
    noise.start(t);
  } catch (e) {}
  if (navigator.vibrate) navigator.vibrate(30); // works on Android, no-op on iOS Safari
}

// ---- rAF-driven animation, fully interruptible mid-flight for fast flicking ----
let pos = 0;          // current offset of cur() card, 0 (rest) to -H (fully committed)
let animToken = 0;    // incrementing token invalidates any in-flight animation loop
let dragging = false;
let startY = 0, startPos = 0;
let lastY = 0, lastT = 0, velocity = 0;
let count = 0;

function render() {
  cur().card.style.transform = `translateY(${pos}px)`;
  nxt().card.style.transform = `translateY(${H + pos}px)`;
}

function animate(target, duration, onDone) {
  const myToken = ++animToken;
  const startVal = pos;
  const startTime = performance.now();
  function step(now) {
    if (myToken !== animToken) return; // interrupted by a new touch
    const t = Math.min(1, (now - startTime) / duration);
    const eased = 1 - Math.pow(1 - t, 3);
    pos = startVal + (target - startVal) * eased;
    render();
    if (t < 1) {
      requestAnimationFrame(step);
    } else {
      pos = target;
      render();
      if (onDone) onDone();
    }
  }
  requestAnimationFrame(step);
}

function commitSwipe() {
  animate(-H, 120, () => {
    count++;
    counterNum.textContent = count;
    tick();

    const oldCur = curIdx;
    curIdx = nextIdx;
    nextIdx = oldCur;

    pos = 0;
    render();
    drawCard(nxt().canvas); // paint fresh content into the new "next" layer
  });
}

function cancelSwipe() {
  animate(0, 140);
}

stage.addEventListener('touchstart', e => {
  // iOS Safari only allows audio to start from a direct gesture — unlock/resume it right here.
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
  }
  if (audioCtx && audioCtx.state === 'suspended') {
    audioCtx.resume();
  }

  animToken++; // invalidate any animation in progress so a new drag can take over instantly
  startY = e.touches[0].clientY;
  lastY = startY;
  lastT = performance.now();
  velocity = 0;
  startPos = pos;
  dragging = true;
  hint.style.opacity = '0';
}, { passive: true });

stage.addEventListener('touchmove', e => {
  if (!dragging) return;
  const y = e.touches[0].clientY;
  const now = performance.now();
  const dt = now - lastT;
  if (dt > 0) velocity = (y - lastY) / dt; // px per ms, negative = moving up
  lastY = y;
  lastT = now;

  const dy = y - startY;
  pos = Math.max(-H, Math.min(0, startPos + dy));
  render();
}, { passive: true });

stage.addEventListener('touchend', e => {
  if (!dragging) return;
  dragging = false;

  const distanceThreshold = H * 0.15;
  const flungFastEnough = velocity < -0.35; // fast upward flick, even if short distance
  const draggedFarEnough = pos < -distanceThreshold;

  if (flungFastEnough || draggedFarEnough) {
    commitSwipe();
  } else {
    cancelSwipe();
  }
});
</script>

</body>
</html>
